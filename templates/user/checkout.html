<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
        }

        .container {
            width: 800px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .total {
            text-align: right;
            font-size: 18px;
            margin-top: 20px;
        }

        .btn-place {
            background: #2ecc71;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            float: right;
            margin-top: 20px;
        }
        .checkout-container {
            width: 900px;
            margin: 50px auto;
        }

        .address-section {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            margin-top: 40px;
        }

        .address-section h3 {
            margin-bottom: 20px;
            font-size: 22px;
            color: #1f2a44;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .form-group {
            flex: 1;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #ff7a59;
            outline: none;
        }

        textarea {
            resize: none;
            height: 80px;
        }

        .place-order-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            float: right;
            margin-top: 10px;
            transition: 0.3s;
        }

        .place-order-btn:hover {
            background: #27ae60;
        }

    </style>
</head>
<body>

<div class="container">
    <h2>Checkout</h2>

    <table>
        <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Total</th>
        </tr>

        {% for item in cart_items %}
        <tr>
            <td>{{ item.NAME }}</td>
            <td>₹{{ item.PRICE }}</td>
            <td>{{ item.QUANTITY }}</td>
            <td>₹{{ item.TOTAL }}</td>
        </tr>
        {% endfor %}
    </table>

    <div class="total">
        <strong>Grand Total: ₹{{ total_amount }}</strong>
    </div>

</div>
<div class="checkout-container">

    <div class="address-section">
        <h3>Shipping Address</h3>

        <form method="POST" action="{{ url_for('place_order') }}">

            <div class="row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="fullname" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" name="phone" required>
                </div>
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea name="address" required></textarea>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>City</label>
                    <input type="text" name="city" required>
                </div>

                <div class="form-group">
                    <label>Pincode</label>
                    <input type="text" name="pincode" required>
                </div>
            </div>

            <button type="submit" class="place-order-btn">
                Place Order
            </button>

        </form>
    </div>

</div>


</body>
</html>
