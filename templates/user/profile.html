<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .header {
            background: #1f2a44;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
        }

        .profile-container {
            width: 500px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .profile-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1f2a44;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .profile-actions {
            text-align: center;
            margin-top: 30px;
        }

        .btn {
            padding: 10px 20px;
            margin: 5px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-update {
            background: #2ecc71;
            color: white;
        }

        .btn-password {
            background: #ff7a59;
            color: white;
            text-decoration: none;
        }

        .btn-logout {
            background: #e74c3c;
            color: white;
            text-decoration: none;
        }

        .btn-home {
            background: #3498db;
            color: white;
            text-decoration: none;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .message {
            text-align: center;
            color: green;
            margin-bottom: 15px;
        }

    </style>
</head>
<body>

<div class="header">
    User Profile
</div>

<div class="profile-container">

    <h2>Update Profile</h2>

    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('user_profile') }}">

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" value="{{ username }}" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ user_email }}" required>
        </div>

        <div class="profile-actions">
            <button type="submit" class="btn btn-update">
                Update Profile
            </button>

            <a href="{{ url_for('user_change_password') }}" class="btn btn-password">
                Update Password
            </a>

            <a href="{{ url_for('user_logout') }}" class="btn btn-logout">
                Logout
            </a>

            <a href="{{ url_for('user') }}" class="btn btn-home">
                Back to Home
            </a>
        </div>

    </form>

</div>

</body>
</html>
